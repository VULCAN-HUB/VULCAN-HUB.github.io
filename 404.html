<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>페이지를 찾을 수 없습니다 — VULCAN-HUB</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.svg">
  <style>
    :root{color-scheme:dark light;--bg:#0E1116;--ink:#E8EBF0;--muted:#878E9B;--accent:#3D6BFF;--accent-hover:#5A80FF}
    @media (prefers-color-scheme:light){:root:not([data-theme]){--bg:#F3F4F7;--ink:#141821;--muted:#697180;--accent:#2F52D8}}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:8px;text-align:center;padding:24px;background:var(--bg);color:var(--muted);
      font-family:-apple-system,"Segoe UI",system-ui,sans-serif}
    .code{font-size:clamp(64px,16vw,140px);font-weight:800;letter-spacing:-.03em;color:var(--ink);line-height:1;margin:0}
    .code b{color:var(--accent)}
    h1{font-size:clamp(18px,3vw,24px);color:var(--ink);font-weight:700;margin:8px 0 2px}
    p{margin:0 0 22px;max-width:42ch}
    a.home{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:11px;
      background:var(--accent);color:#fff;font-weight:600;text-decoration:none}
    a.home:hover{background:var(--accent-hover)}
  </style>
</head>
<body>
  <p class="code">4<b>0</b>4</p>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>주소가 바뀌었거나 없는 페이지예요. 홈에서 프로그램을 둘러보세요.</p>
  <a class="home" href="/">← 홈으로</a>
</body>
</html>
